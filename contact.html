      <!-- Map Column -->
      <div class="col-lg-6 mb-4">
        <!-- Embedded Google Map -->
        <iframe width="100%" height="360px" frameborder="0" scrolling="no" marginheight="0" marginwidth="0" src="http://maps.google.com/maps?hl=en&amp;ie=UTF8&amp;ll=20.6510685!4d-103.2614061&amp;spn=56.506174,79.013672&amp;t=m&amp;z=17&amp;output=embed&amp;q=Brócoli+6,+La+Hortaliza,+45404+Tonalá,+Jal."></iframe>

      <!-- Contact Details Column -->
      
      <div class="col-lg-6 mb-4">
          <h3>Enviar un correo electrónico</h3>
          <form name="sentMessage" id="contactForm" novalidate>
            <div class="control-group form-group">
              <div class="controls">
                <label>Nombre:</label>
                <input type="text" class="form-control" id="name" required data-validation-required-message="Por favor introduzca su nombre.">
                <p class="help-block"></p>
              </div>
            </div>
            <div class="control-group form-group">
              <div class="controls">
                <label>Correo:</label>
                <input type="email" class="form-control" id="email" required data-validation-required-message="Por favor introduzca su dirección de correo.">
              </div>
            </div>
            <div class="control-group form-group">
              <div class="controls">
                <label>Mensaje:</label>
                <textarea rows="10" cols="100" class="form-control" id="message" required data-validation-required-message="Por favor introduzca un mensaje." maxlength="999" style="resize:none"></textarea>
              </div>
            </div>
            <div id="success"></div>
            <!-- For success/fail messages -->
            <button type="submit" class="btn btn-primary" id="sendMessageButton">Enviar Correo</button>
          </form>
        </div>
    </div>
